name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend build, tests & Docker check
    runs-on: ubuntu-latest
    permissions:
      checks: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('BankApp/**/*.csproj', 'BankApp/Directory.Build.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: |
          dotnet restore BankApp/src/BankApp.Api/BankApp.Api.csproj
          dotnet restore BankApp/tests/BankApp.Domain.Tests/BankApp.Domain.Tests.csproj
          dotnet restore BankApp/tests/BankApp.Application.Tests/BankApp.Application.Tests.csproj
          dotnet restore BankApp/tests/BankApp.Infrastructure.Tests/BankApp.Infrastructure.Tests.csproj
          dotnet restore BankApp/tests/BankApp.Api.Tests/BankApp.Api.Tests.csproj

      - name: Build (StyleCop)
        run: dotnet build BankApp/src/BankApp.Api/BankApp.Api.csproj --no-restore --configuration Release

      - name: Test
        run: |
          dotnet test BankApp/tests/BankApp.Domain.Tests/BankApp.Domain.Tests.csproj \
            --no-restore --configuration Release \
            --logger "trx;LogFileName=domain-tests.trx" \
            --results-directory BankApp/test-results
          dotnet test BankApp/tests/BankApp.Application.Tests/BankApp.Application.Tests.csproj \
            --no-restore --configuration Release \
            --logger "trx;LogFileName=application-tests.trx" \
            --results-directory BankApp/test-results
          dotnet test BankApp/tests/BankApp.Infrastructure.Tests/BankApp.Infrastructure.Tests.csproj \
            --no-restore --configuration Release \
            --logger "trx;LogFileName=infrastructure-tests.trx" \
            --results-directory BankApp/test-results
          dotnet test BankApp/tests/BankApp.Api.Tests/BankApp.Api.Tests.csproj \
            --no-restore --configuration Release \
            --logger "trx;LogFileName=api-tests.trx" \
            --results-directory BankApp/test-results

      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Test Results
          path: BankApp/test-results/*.trx
          reporter: dotnet-trx

      - name: Docker build check
        run: |
          docker build \
            -f BankApp/src/BankApp.Api/Dockerfile \
            -t bankapp-api:ci \
            BankApp/

  desktop:
    name: Desktop tests
    runs-on: windows-latest
    permissions:
      checks: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('BankApp/**/*.csproj', 'BankApp/Directory.Build.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore BankApp/tests/BankApp.Desktop.Tests/BankApp.Desktop.Tests.csproj

      - name: Test
        run: |
          New-Item -ItemType Directory -Force -Path BankApp/test-results
          dotnet test BankApp/tests/BankApp.Desktop.Tests/BankApp.Desktop.Tests.csproj --no-restore --configuration Release --logger "trx;LogFileName=desktop-tests.trx" --results-directory BankApp/test-results
          Get-ChildItem -Path BankApp/test-results -Recurse

      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Desktop Test Results
          path: BankApp/test-results/**/*.trx
          reporter: dotnet-trx
