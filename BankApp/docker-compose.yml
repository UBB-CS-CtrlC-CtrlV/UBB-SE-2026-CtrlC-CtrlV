services:

  db:
    image: mcr.microsoft.com/mssql/server:2025-latest
    environment:
      MSSQL_SA_PASSWORD: "${DB_SA_PASSWORD}"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      # $$ escapes Compose interpolation — the container shell resolves it at runtime.
      test: >
        /opt/mssql-tools18/bin/sqlcmd
        -S localhost -U sa -P "$$MSSQL_SA_PASSWORD"
        -Q "SELECT 1" -b -No -o /dev/null
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  db-init:
    image: mcr.microsoft.com/mssql/server:2022-latest
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./scripts/db:/scripts:ro
    environment:
      # SQLCMDPASSWORD is read automatically by sqlcmd — avoids passing password on the command line.
      SQLCMDPASSWORD: "${DB_SA_PASSWORD}"
    command: >
      /opt/mssql-tools18/bin/sqlcmd
      -S db -U sa
      -i /scripts/schema.sql
      -b -No
    restart: "no"

  server:
    build:
      context: .
      dockerfile: src/BankApp.Server/Dockerfile
    ports:
      - "5024:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: >-
        Server=db;Database=BankAppDb;User Id=sa;
        Password=${DB_SA_PASSWORD};TrustServerCertificate=True;
      Jwt__Secret: "${JWT_SECRET}"
      Email__SmtpHost: "${EMAIL_SMTP_HOST}"
      Email__SmtpPort: "${EMAIL_SMTP_PORT}"
      Email__SmtpUser: "${EMAIL_SMTP_USER}"
      Email__SmtpPass: "${EMAIL_SMTP_PASS}"
      Email__FromAddress: "${EMAIL_FROM_ADDRESS}"
    depends_on:
      db:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully

volumes:
  sqlserver-data:
