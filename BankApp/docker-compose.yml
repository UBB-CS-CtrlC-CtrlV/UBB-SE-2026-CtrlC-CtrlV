services:

  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      MSSQL_SA_PASSWORD: "${DB_SA_PASSWORD}"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      # sqlcmd is pre-installed in the MSSQL image.
      # $$MSSQL_SA_PASSWORD: the $$ escapes Compose interpolation so the shell
      # inside the container resolves the variable at runtime.
      test: >
        /opt/mssql-tools18/bin/sqlcmd
        -S localhost -U sa -P "$$MSSQL_SA_PASSWORD"
        -Q "SELECT 1" -b -No -o /dev/null
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  server:
    build:
      context: .
      dockerfile: src/BankApp.Server/Dockerfile
    ports:
      # Host port 5024 matches the ApiBaseUrl in the client's appsettings.json.
      # The aspnet base image listens on 8080 inside the container.
      - "5024:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: >-
        Server=db;Database=BankAppDb;User Id=sa;
        Password=${DB_SA_PASSWORD};TrustServerCertificate=True;
      Jwt__Secret: "${JWT_SECRET}"
      Email__SmtpHost: "${EMAIL_SMTP_HOST}"
      Email__SmtpPort: "${EMAIL_SMTP_PORT}"
      Email__SmtpUser: "${EMAIL_SMTP_USER}"
      Email__SmtpPass: "${EMAIL_SMTP_PASS}"
      Email__FromAddress: "${EMAIL_FROM_ADDRESS}"
    depends_on:
      db:
        condition: service_healthy

volumes:
  sqlserver-data:
